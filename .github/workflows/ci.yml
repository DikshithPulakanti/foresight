name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check services/ --ignore E501 || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio httpx fastapi
          pip install -r services/api/requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: "services/mcp-servers:services/api:services:."
        run: pytest tests/ --tb=short -q

  docker-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: foresight123
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          cp .env.example .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=foresight123" >> .env

      - name: Check docker-compose syntax
        run: docker compose config --quiet
